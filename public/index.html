<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tend — A Love Tool</title>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #EDE4D2 0%, #6A5840 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    h1 {
      color: #1A1410;
      font-size: 48px;
      margin: 0;
    }
    p {
      color: #666;
      font-size: 18px;
      margin: 20px 0;
    }
    .status {
      margin-top: 30px;
      padding: 20px;
      background: #f0f0f0;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✦ Tend</h1>
    <p>A relationship maintenance app for people who care deeply</p>
    <div class="status">
      <p>Coming soon to web</p>
      <p>Building your app...</p>
    </div>
  </div>
</body>
</html>
